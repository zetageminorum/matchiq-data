name: Update Matches

on:
  schedule:
  - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch matches
        run: |
          curl -X GET "https://v3.football.api-sports.io/fixtures?date=$(date +%F)" \
          -H "x-apisports-key: ${{ secrets.API_KEY }}" \
          -o matches.json

      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add matches.json
          git commit -m "update matches" || echo "No changes"

      - name: Push changes
        run: git push --force
