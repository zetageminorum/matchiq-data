name: Update Matches

on:
  schedule:
  - cron: "0 5,8,11,14,17 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Debug Time
        run: date  

      - name: Fetch matches
        run: |
          curl -X GET "https://v3.football.api-sports.io/fixtures?date=$(date +%F)" \
          -H "x-apisports-key: ${{ secrets.API_KEY }}" \
          -o matches.json

      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add matches.json
          git restore --staged .github/workflows/update-matches.yml || true
          git commit -m "update matches" || echo "No changes"

      - name: Push changes
        run: git push --force
